name: Bootstrap viewer selection from PR

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/viewer-multi-select'
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/viewer-multi-select
          fetch-depth: 0

      - name: Execute the validated patch script
        shell: bash
        run: |
          set +e
          python3 -m pip install --quiet pyyaml
          python3 <<'PY' >bootstrap-error.txt 2>&1
          from pathlib import Path
          import subprocess
          import yaml

          with open('.github/workflows/phab-apply-viewer-selection.yml') as handle:
              workflow = yaml.safe_load(handle)

          steps = workflow['jobs']['apply']['steps']
          patch_step = next(step for step in steps if step.get('name') == 'Apply the viewer multi-select implementation')
          script = '\n'.join(
              line
              for line in patch_step['run'].splitlines()
              if not line.startswith("replace_once('package-lock.json'")
          )
          subprocess.run(['bash', '-euo', 'pipefail', '-c', script], check=True)

          lock_path = Path('package-lock.json')
          lock = lock_path.read_text()
          root_old = '{\n  "name": "memories",\n  "version": "8.1.0",'
          root_new = '{\n  "name": "memories",\n  "version": "8.1.90",'
          package_old = '    "": {\n      "name": "memories",\n      "version": "8.1.0",'
          package_new = '    "": {\n      "name": "memories",\n      "version": "8.1.90",'
          if lock.count(root_old) != 1 or lock.count(package_old) != 1:
              raise RuntimeError('Could not identify the two Memories package-lock version fields')
          lock = lock.replace(root_old, root_new, 1).replace(package_old, package_new, 1)
          lock_path.write_text(lock)
          PY
          status=$?
          cat bootstrap-error.txt
          exit "$status"

      - name: Upload patch failure details
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-error
          path: bootstrap-error.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check Vue and TypeScript
        run: npx vue-tsc --noEmit

      - name: Build production frontend
        run: npm run build

      - name: Commit implementation and build output
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "NordicPaws"
          git config user.email "248070006+NordicPaws@users.noreply.github.com"
          git add appinfo/info.xml package.json package-lock.json src
          if [ -d js ]; then
            git add -f js
          fi
          git commit -m "feat: select photos from the viewer [viewer-selection-applied]"
          git push origin HEAD:feature/viewer-multi-select
