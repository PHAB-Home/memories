name: Apply viewer multi-select

on:
  push:
    branches:
      - feature/viewer-multi-select

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[viewer-selection-applied]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply the viewer multi-select implementation
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"Expected one match in {path}, found {count}: {old[:100]!r}")
              file.write_text(text.replace(old, new, 1))

          # Give each timeline a stable in-memory identity so viewer events only
          # affect the SelectionManager belonging to the active timeline.
          replace_once(
              "src/typings/timeline.d.ts",
              "  export interface TimelineState {\n    list: IRow[];",
              "  export interface TimelineState {\n    timelineId: string;\n    list: IRow[];",
          )

          replace_once(
              "src/components/Timeline.vue",
              "    <SelectionManager\n      ref=\"selectionManager\"\n      :heads=\"heads\"",
              "    <SelectionManager\n      ref=\"selectionManager\"\n      :timeline-id=\"timelineId\"\n      :heads=\"heads\"",
          )
          replace_once(
              "src/components/Timeline.vue",
              "  data: () => ({\n    /** Loading days response */",
              "  data: () => ({\n    /** Identity used to scope viewer selection events to this timeline. */\n    timelineId: `${Date.now()}-${Math.random().toString(36).slice(2)}`,\n\n    /** Loading days response */",
          )

          # Add typed selection events to the existing Nextcloud event-bus wrapper.
          replace_once(
              "src/services/utils/event-bus.ts",
              "  /** Albums were updated for these photos */\n  'memories:albums:update': IPhoto[];",
              "  /** Albums were updated for these photos */\n  'memories:albums:update': IPhoto[];\n\n  /** Toggle a photo in the active timeline selection from the viewer. */\n  'memories:selection:toggle': { timelineId: string; photo: IPhoto };\n  /** Synchronize the timeline selection fragment after the viewer closes. */\n  'memories:selection:sync': { timelineId: string };",
          )

          # SelectionManager owns selection state. The viewer only requests changes
          # through scoped, typed events; no new global manager is introduced.
          replace_once(
              "src/components/SelectionManager.vue",
              "  props: {\n    heads: {",
              "  props: {\n    timelineId: {\n      type: String,\n      required: true,\n    },\n    heads: {",
          )
          replace_once(
              "src/components/SelectionManager.vue",
              "    // Subscribe to global events\n    utils.bus.on('memories:albums:update', this.clear);",
              "    // Subscribe to global events\n    utils.bus.on('memories:selection:toggle', this.handleViewerToggle);\n    utils.bus.on('memories:selection:sync', this.handleViewerSync);\n    utils.bus.on('memories:albums:update', this.clear);",
          )
          replace_once(
              "src/components/SelectionManager.vue",
              "    // Unsubscribe from global events\n    utils.bus.off('memories:albums:update', this.clear);",
              "    // Unsubscribe from global events\n    utils.bus.off('memories:selection:toggle', this.handleViewerToggle);\n    utils.bus.off('memories:selection:sync', this.handleViewerSync);\n    utils.bus.off('memories:albums:update', this.clear);",
          )
          replace_once(
              "src/components/SelectionManager.vue",
              "    show(value: boolean, from: boolean) {\n      utils.fragment.if(value, utils.fragment.types.selection);\n    },",
              "    show(value: boolean) {\n      // While the viewer is open it must remain the top route fragment so\n      // slide changes and browser history continue to work. Selection is\n      // synchronized after the viewer fragment has been removed.\n      if (_m.viewer.isOpen) return;\n      utils.fragment.if(value, utils.fragment.types.selection);\n    },",
          )
          replace_once(
              "src/components/SelectionManager.vue",
              "  methods: {\n    deleteSelectedPhotosById(delIds: number[], selection: Selection) {",
              "  methods: {\n    /** Handle a selection request from the viewer for this timeline. */\n    handleViewerToggle({ timelineId, photo }: { timelineId: string; photo: IPhoto }) {\n      if (timelineId !== this.timelineId) return;\n      this.selectPhoto(photo);\n    },\n\n    /** Synchronize the selection route fragment after the viewer closes. */\n    handleViewerSync({ timelineId }: { timelineId: string }) {\n      if (timelineId !== this.timelineId) return;\n      utils.fragment.if(this.show, utils.fragment.types.selection);\n    },\n\n    deleteSelectedPhotosById(delIds: number[], selection: Selection) {",
          )

          # Viewer UI and keyboard shortcut. Dynamic viewers remember the owning
          # timeline; static viewers do not expose selection.
          replace_once(
              "src/components/viewer/Viewer.vue",
              "import RotateLeftIcon from 'vue-material-design-icons/RotateLeft.vue';",
              "import RotateLeftIcon from 'vue-material-design-icons/RotateLeft.vue';\nimport CheckCircleIcon from 'vue-material-design-icons/CheckCircle.vue';\nimport CheckboxBlankCircleOutlineIcon from 'vue-material-design-icons/CheckboxBlankCircleOutline.vue';",
          )
          replace_once(
              "src/components/viewer/Viewer.vue",
              "    currIndex: -1,\n\n    /** Timer to move to next photo */",
              "    currIndex: -1,\n    timelineId: null as string | null,\n\n    /** Timer to move to next photo */",
          )
          replace_once(
              "src/components/viewer/Viewer.vue",
              "        {\n          id: 'info',\n          name: this.t('memories', 'Info'),",
              "        {\n          id: 'select',\n          name: this.isSelected ? this.t('memories', 'Deselect') : this.t('memories', 'Select'),\n          icon: this.isSelected ? CheckCircleIcon : CheckboxBlankCircleOutlineIcon,\n          callback: this.toggleSelectCurrent,\n          if: Boolean(this.timelineId && this.currentPhoto),\n        },\n        {\n          id: 'info',\n          name: this.t('memories', 'Info'),",
          )
          replace_once(
              "src/components/viewer/Viewer.vue",
              "    /** Is the current photo a favorite */\n    isFavorite() {",
              "    /** Is the current photo selected in the active timeline */\n    isSelected(): boolean {\n      return Boolean((this.currentPhoto?.flag ?? 0) & this.c.FLAG_SELECTED);\n    },\n\n    /** Is the current photo a favorite */\n    isFavorite() {",
          )
          replace_once(
              "src/components/viewer/Viewer.vue",
              "    async openDynamic(anchorPhoto: IPhoto, timeline: TimelineState) {\n      const detail = anchorPhoto.d?.detail;",
              "    async openDynamic(anchorPhoto: IPhoto, timeline: TimelineState) {\n      this.timelineId = timeline.timelineId;\n      const detail = anchorPhoto.d?.detail;",
          )
          replace_once(
              "src/components/viewer/Viewer.vue",
              "    async openStatic(photo: IPhoto, list: IPhoto[], thumbSize?: 256 | 512) {\n      this.list = list;",
              "    async openStatic(photo: IPhoto, list: IPhoto[], thumbSize?: 256 | 512) {\n      this.timelineId = null;\n      this.list = list;",
          )
          replace_once(
              "src/components/viewer/Viewer.vue",
              "        this.globalAnchor = -1;\n        clearTimeout(this.slideshowTimer);",
              "        this.globalAnchor = -1;\n        this.timelineId = null;\n        clearTimeout(this.slideshowTimer);",
          )
          replace_once(
              "src/components/viewer/Viewer.vue",
              "      if (e.key === 'Delete') {\n        this.deleteCurrent();\n      }",
              "      if (e.key === ' ' && this.timelineId) {\n        const target = e.target;\n        const editing =\n          target instanceof HTMLInputElement ||\n          target instanceof HTMLTextAreaElement ||\n          target instanceof HTMLSelectElement ||\n          target instanceof HTMLButtonElement ||\n          (target instanceof HTMLElement && target.isContentEditable);\n        if (!editing) {\n          e.preventDefault();\n          this.toggleSelectCurrent();\n        }\n      }\n\n      if (e.key === 'Delete') {\n        this.deleteCurrent();\n      }",
          )
          replace_once(
              "src/components/viewer/Viewer.vue",
              "    /** Delete this photo and refresh */\n    async deleteCurrent() {",
              "    /** Toggle selection of the current photo in the owning timeline. */\n    toggleSelectCurrent() {\n      if (!this.timelineId || !this.currentPhoto) return;\n      utils.bus.emit('memories:selection:toggle', {\n        timelineId: this.timelineId,\n        photo: this.currentPhoto,\n      });\n    },\n\n    /** Delete this photo and refresh */\n    async deleteCurrent() {",
          )
          replace_once(
              "src/components/viewer/Viewer.vue",
              "        return utils.fragment.pop(utils.fragment.types.viewer);",
              "        await utils.fragment.pop(utils.fragment.types.viewer);\n        if (this.timelineId) {\n          utils.bus.emit('memories:selection:sync', { timelineId: this.timelineId });\n        }\n        return;",
          )
          replace_once(
              "src/components/viewer/Viewer.vue",
              "    setFragment(photo: IPhoto | null) {",
              "    async setFragment(photo: IPhoto | null) {",
          )

          # Use a valid semver that stays above official 8.1.x releases but below 8.2.
          replace_once("appinfo/info.xml", "    <version>8.1.0</version>", "    <version>8.1.90</version>")
          replace_once('package.json', '  "version": "8.1.0",', '  "version": "8.1.90",')
          replace_once('package-lock.json', '  "version": "8.1.0",', '  "version": "8.1.90",')
          replace_once('package-lock.json', '      "version": "8.1.0",', '      "version": "8.1.90",')
          PY

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check Vue and TypeScript
        run: npx vue-tsc --noEmit

      - name: Build production frontend
        run: npm run build

      - name: Commit implementation and build output
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "NordicPaws"
          git config user.email "248070006+NordicPaws@users.noreply.github.com"
          git rm .github/workflows/phab-apply-viewer-selection.yml
          git add appinfo/info.xml package.json package-lock.json src js
          git commit -m "feat: select photos from the viewer [viewer-selection-applied]"
          git push origin HEAD:feature/viewer-multi-select
