name: Package Memories 8.1.90

on:
  push:
    branches:
      - build/memories-8.1.90
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  package:
    if: github.event_name == 'push' || github.head_ref == 'build/memories-8.1.90'
    runs-on: ubuntu-latest

    steps:
      - name: Check out build branch
        uses: actions/checkout@v4
        with:
          ref: build/memories-8.1.90

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Install system tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends rsync unzip wget

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch runtime binaries
        run: bash scripts/get-bin-ext.sh

      - name: Install production PHP dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Apply upstream dependency patches
        run: bash scripts/patch-external.sh

      - name: Type-check frontend
        run: npx vue-tsc --noEmit

      - name: Build production frontend
        run: |
          rm -f js/*
          npm run build

      - name: Stage runtime app
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist package-output
          mkdir -p dist/memories package-output

          for item in appinfo bin-ext css img js l10n lib templates vendor; do
            if [ -e "$item" ]; then
              cp -a "$item" dist/memories/
            fi
          done

          for item in COPYING LICENSE README.md; do
            if [ -e "$item" ]; then
              cp -a "$item" dist/memories/
            fi
          done

          rm -f dist/memories/appinfo/signature.json

          test -f dist/memories/appinfo/info.xml
          test -f dist/memories/js/memories-main.js
          test -d dist/memories/lib
          test -d dist/memories/vendor
          test -x dist/memories/bin-ext/go-vod-aarch64
          test -x dist/memories/bin-ext/go-vod-amd64

          version="$(php -r '$x=simplexml_load_file("dist/memories/appinfo/info.xml"); echo (string)$x->version;')"
          test "$version" = "8.1.90"

      - name: Create archive and installer
        shell: bash
        run: |
          set -euo pipefail
          tar --sort=name --mtime='UTC 2026-07-23' --owner=0 --group=0 --numeric-owner \
            -czf package-output/memories-8.1.90.tar.gz -C dist memories
          (cd package-output && sha256sum memories-8.1.90.tar.gz > memories-8.1.90.tar.gz.sha256)

          cat > package-output/install-memories-8.1.90.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          ARCHIVE="${1:-memories-8.1.90.tar.gz}"
          CONTAINER="${NEXTCLOUD_CONTAINER:-nextcloud}"

          if [ ! -f "$ARCHIVE" ]; then
            echo "Archive not found: $ARCHIVE" >&2
            exit 1
          fi
          ARCHIVE="$(realpath "$ARCHIVE")"

          if ! docker inspect "$CONTAINER" >/dev/null 2>&1; then
            echo "Nextcloud container not found: $CONTAINER" >&2
            exit 1
          fi

          CHECKSUM="${ARCHIVE}.sha256"
          if [ -f "$CHECKSUM" ]; then
            (
              cd "$(dirname "$ARCHIVE")"
              sha256sum -c "$(basename "$CHECKSUM")"
            )
          fi

          APP_PATH="$(docker exec -u www-data "$CONTAINER" php occ app:getpath memories)"
          if [ -z "$APP_PATH" ] || [ "$APP_PATH" = "/" ]; then
            echo "Could not resolve the installed Memories path" >&2
            exit 1
          fi
          OLD_VERSION="$(docker exec -u www-data "$CONTAINER" php occ config:app:get memories installed_version 2>/dev/null || true)"

          PARENT="$(dirname "$APP_PATH")"
          STAMP="$(date -u +%Y%m%dT%H%M%SZ)"
          BACKUP="${APP_PATH}.backup-${STAMP}"
          STAGE="${PARENT}/.memories-stage-${STAMP}"
          REMOTE_ARCHIVE="/tmp/memories-8.1.90-${STAMP}.tar.gz"

          echo "Container   : $CONTAINER"
          echo "App path    : $APP_PATH"
          echo "Old version : ${OLD_VERSION:-unknown}"
          echo "Backup      : $BACKUP"

          docker cp "$ARCHIVE" "$CONTAINER:$REMOTE_ARCHIVE"
          docker exec "$CONTAINER" sh -eu -c \
            "rm -rf '$STAGE'; mkdir -p '$STAGE'; tar -xzf '$REMOTE_ARCHIVE' -C '$STAGE'; test -f '$STAGE/memories/appinfo/info.xml'; chown -R www-data:www-data '$STAGE/memories'"

          docker exec -u www-data "$CONTAINER" php occ app:disable memories >/dev/null || true

          rollback() {
            echo "Installation failed; restoring $BACKUP" >&2
            docker exec "$CONTAINER" sh -eu -c \
              "rm -rf '$APP_PATH'; if [ -d '$BACKUP/.appinfo-disabled' ]; then mv '$BACKUP/.appinfo-disabled' '$BACKUP/appinfo'; fi; if [ -d '$BACKUP' ]; then mv '$BACKUP' '$APP_PATH'; fi; rm -rf '$STAGE'; rm -f '$REMOTE_ARCHIVE'"
            if [ -n "$OLD_VERSION" ]; then
              docker exec -u www-data "$CONTAINER" php occ config:app:set memories installed_version --value="$OLD_VERSION" >/dev/null || true
            fi
            docker exec -u www-data "$CONTAINER" php occ app:enable memories >/dev/null || true
          }
          trap rollback ERR

          docker exec "$CONTAINER" sh -eu -c \
            "test -d '$APP_PATH'; test -d '$APP_PATH/appinfo'; mv '$APP_PATH' '$BACKUP'; mv '$BACKUP/appinfo' '$BACKUP/.appinfo-disabled'; mv '$STAGE/memories' '$APP_PATH'; rmdir '$STAGE'; rm -f '$REMOTE_ARCHIVE'"

          docker exec -u www-data "$CONTAINER" php occ app:enable memories >/dev/null
          APP_LIST="$(docker exec -u www-data "$CONTAINER" php occ app:list --output=json)"
          if ! printf '%s' "$APP_LIST" | tr -d '[:space:]' | grep -Fq '"memories":"8.1.90"'; then
            echo "Installed Memories version could not be verified as 8.1.90" >&2
            exit 1
          fi

          trap - ERR
          echo "Memories 8.1.90 installed successfully."
          echo "Inactive rollback copy retained at: $BACKUP"
          SCRIPT

          chmod 755 package-output/install-memories-8.1.90.sh

          cat > package-output/README.txt <<'README'
          Memories 8.1.90 — viewer multi-select build

          Files:
          - memories-8.1.90.tar.gz: complete Nextcloud app package
          - memories-8.1.90.tar.gz.sha256: checksum
          - install-memories-8.1.90.sh: Docker installer with automatic rollback

          Default container name: nextcloud
          Override with: NEXTCLOUD_CONTAINER=<name>

          Installation:
            chmod +x install-memories-8.1.90.sh
            ./install-memories-8.1.90.sh memories-8.1.90.tar.gz

          The installer retains an inactive rollback copy beside the app directory.
          Its appinfo directory is renamed so Nextcloud cannot detect it as a second app.
          On automatic rollback, the previous stored app version is restored before re-enabling Memories.
          README

      - name: Inspect package contents
        run: |
          tar -tzf package-output/memories-8.1.90.tar.gz | sed -n '1,80p'
          (cd package-output && sha256sum -c memories-8.1.90.tar.gz.sha256)
          bash -n package-output/install-memories-8.1.90.sh
          grep -Fq 'config:app:set memories installed_version' package-output/install-memories-8.1.90.sh
          du -sh package-output/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: memories-8.1.90-distribution
          path: package-output/
          if-no-files-found: error
          retention-days: 90
